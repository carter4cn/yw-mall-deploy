# yw-mall-deploy — Application layer compose file.
#
# Quick start:
#   make infra-up   → start env layer (MySQL, Redis, etcd, MinIO …)
#   make up         → build & start app (db-init → RPCs → API → FE)
#   make seed       → populate demo data (run once)
#   make start      → infra-up + up in one shot
#
# Ports exposed to host:
#   18080   Frontend (uni-app H5)
#   18888   API gateway
#
# Network: joins the Podman network "env_infra" created by env/compose.yml.

networks:
  env_infra:
    external: true

# ─────────────────────────────────────────────────────────
# Shared build defaults
# ─────────────────────────────────────────────────────────
x-rpc-defaults: &rpc-defaults
  build:
    context: ../yw-mall
    dockerfile: Dockerfile
  networks: [env_infra]
  restart: unless-stopped
  depends_on:
    db-init:
      condition: service_completed_successfully

services:

  # ── DDL bootstrap (one-shot) ──────────────────────────────────────────────
  db-init:
    image: docker.io/library/mysql:9.6.0
    volumes:
      - ../yw-mall:/workspace:ro
      - ./scripts/db-init.sh:/db-init.sh:ro
    command: bash /db-init.sh
    environment:
      MYSQL_PWD: proxysql123
    networks: [env_infra]
    restart: "no"

  # ── RPC services ─────────────────────────────────────────────────────────

  mall-user-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-user-rpc }
    command: ["-f", "etc/user.yaml"]

  mall-shop-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-shop-rpc }
    command: ["-f", "etc/shop.yaml"]

  mall-product-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-product-rpc }
    command: ["-f", "etc/product.yaml"]

  mall-order-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-order-rpc }
    command: ["-f", "etc/order.yaml"]

  mall-cart-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-cart-rpc }
    command: ["-f", "etc/cart.yaml"]

  mall-payment-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-payment-rpc }
    command: ["-f", "etc/payment.yaml"]

  mall-activity-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-activity-rpc }
    command: ["-f", "etc/activity.yaml"]

  mall-rule-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-rule-rpc }
    command: ["-f", "etc/rule.yaml"]

  mall-workflow-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-workflow-rpc }
    command: ["-f", "etc/workflow.yaml"]

  mall-reward-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-reward-rpc }
    command: ["-f", "etc/reward.yaml"]

  mall-risk-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-risk-rpc }
    command: ["-f", "etc/risk.yaml"]

  mall-review-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-review-rpc }
    command: ["-f", "etc/review.yaml"]

  mall-logistics-rpc:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-logistics-rpc }
    command: ["-f", "etc/logistics.yaml"]

  mall-activity-async-worker:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-activity-async-worker }
    command: ["-f", "etc/worker.yaml"]

  # ── API Gateway ───────────────────────────────────────────────────────────
  mall-api:
    <<: *rpc-defaults
    build:
      context: ../yw-mall
      dockerfile: Dockerfile
      args: { SERVICE: mall-api }
    command: ["-f", "etc/mall-api.yaml"]
    ports:
      - "18888:18888"

  # ── Seed (opt-in profile; run via: make seed) ─────────────────────────────
  db-seed:
    build:
      context: ..
      dockerfile: yw-mall-deploy/seed.Dockerfile
    networks: [env_infra]
    restart: "no"
    profiles: [seed]

  # ── Frontend (uni-app H5 + nginx) ─────────────────────────────────────────
  mall-fe:
    build:
      context: ../yw-mall-fe
      dockerfile: Dockerfile
    ports:
      - "18080:80"
    networks: [env_infra]
    restart: unless-stopped
    depends_on:
      - mall-api
